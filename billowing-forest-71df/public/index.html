<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hello, World!</title>
	</head>
	<body>
		<h1 id="heading"></h1>
		<script>
			fetch('/message')
				.then((resp) => {
					if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
					return resp.text();
				})
				.then((text) => {
					document.getElementById('heading').textContent = text;
				})
				.catch((err) => {
					document.getElementById('heading').textContent = 'Failed to load message.';
					console.error(err);
				});
		</script>
	</body>
</html>
